<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login page</title>
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div class="login-container">
    <h1>Welcome back</h1>
    <p>Access your orders, wishlist, and exclusive offers by logging in.</p>
    <form>
      <div class="email-box">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter you email">
      </div>
      <div class="password-box">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter you password" <i class="fa-regular fa-eye-slash"></i>
      </div>
      <div class="options">
        <label class="remember">
          <input type="checkbox">
          Remember me
        </label>
        <a href="#">Forgot Password?</a>
      </div>
      <div class="sign-in">
      <button type="submit">
        Sign in 
      </button>
      </div>
      <div class="divider">
      <span>OR</span>
      </div>
    </form>
    <div class="social-buttons">
      <button>
       <i class="fa-brands fa-google"></i>Continue with Google</button>
      <button><i class="fa-brands fa-apple"></i>Continue with Apple</button>
      <p class="signup-text">Don't have an account?
      <a href="#">Sign up</a></p>
    </div>
  </div>
</body>

</html>
